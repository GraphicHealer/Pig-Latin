<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pig Latin Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f0e8;
            --surface: #fdf9f3;
            --ink: #1a1208;
            --accent: #e8420a;
            --accent2: #f7c948;
            --muted: #8c7b62;
            --border: #d4c8b0;
            --radius: 16px;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.25rem 4rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative background blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, #f7c94844 0%, transparent 70%);
            top: -140px;
            right: -140px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #e8420a22 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
        }

        header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 1.5rem;
            margin-top: 1rem;
        }

        .logo-badge {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.3rem 0.85rem;
            border-radius: 999px;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--ink);
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 680px;
            padding: 2rem;
            box-shadow: 0 4px 32px rgba(26, 18, 8, 0.07);
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        @media (max-width: 540px) {
            .panels {
                grid-template-columns: 1fr;
            }
        }

        .panel-label {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            color: var(--ink);
            padding: 0.9rem 1rem;
            resize: vertical;
            transition: border-color 0.2s;
            outline: none;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--border);
        }


        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1.5px;
            background: var(--border);
        }

        .pig-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(232, 66, 10, 0.3);
            transition: transform 0.3s ease;
        }

        .pig-icon:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* Actions row */
        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            padding: 0.65rem 1.25rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            flex: 1;
        }

        .btn-primary:hover {
            background: #c93508;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--ink);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-copy {
            background: var(--accent2);
            color: var(--ink);
        }

        .btn-copy:hover {
            background: #e8b920;
        }

        .btn-copy.copied {
            background: #5cb85c;
            color: #fff;
        }

        /* Rules section */
        .rules {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1.5px solid var(--border);
        }

        .rules-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.85rem;
        }

        .rules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.75rem;
        }

        .rule-card {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
        }

        .rule-card .example {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            color: var(--muted);
        }

        .rule-card .example strong {
            color: var(--accent);
        }

        .rule-card .desc {
            font-size: 0.73rem;
            color: var(--muted);
            margin-top: 0.3rem;
            font-style: italic;
        }

        /* Live badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #5cb85c;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        footer {
            position: relative;
            z-index: 1;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <h1>🐷 Pig Latin Translator</h1>
    </header>

    <div class="card">
        <div class="panels">
            <div>
                <div class="panel-label">English</div>
                <textarea id="english" placeholder="Type English here..." oninput="onEnglishInput()"></textarea>
            </div>
            <div>
                <div class="panel-label">Pig Latin</div>
                <textarea id="piglatin" placeholder="Type Pig Latin here..." oninput="onPigLatinInput()"></textarea>
            </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="pig-icon">🐷</div>
            <div class="divider-line"></div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
            <button class="btn btn-copy" id="copyBtn" onclick="copyOutput()">Copy</button>
        </div>

        <div class="rules">
            <div class="rules-title">Rules</div>
            <div class="rules-grid">
                <div class="rule-card">
                    <div class="example"><strong>dog</strong> → <strong>ogday</strong></div>
                    <div class="desc">Single consonant moves to end + ay</div>
                </div>
                <div class="rule-card">
                    <div class="example"><strong>trash</strong> → <strong>ashtray</strong></div>
                    <div class="desc">Consonant cluster moves together + ay</div>
                </div>
                <div class="rule-card">
                    <div class="example"><strong>apple</strong> → <strong>applehay</strong></div>
                    <div class="desc">Vowel-start words get -hay added</div>
                </div>
            </div>
        </div>
    </div>

    <footer>Made with 🐷 · For Payton to understand us</footer>

    <script>
        const vowels = ['a', 'e', 'i', 'o', 'u'];
        const consonantClusters = ['ch', 'sh', 'th', 'ph', 'wh', 'qu', 'tr', 'cr', 'br', 'fr', 'gr', 'pr', 'dr', 'bl', 'cl', 'fl', 'gl', 'pl', 'sl', 'sc', 'sk', 'sm', 'sn', 'sp', 'st', 'sw', 'thr', 'shr', 'str', 'spl', 'spr', 'squ', 'scr'];

        // Cache for word validation to reduce API calls
        const wordCache = new Map();
        const profanityCache = new Map();

        // Check if word contains profanity using Purgomalum API
        async function isProfanity(word) {
            const lowerWord = word.toLowerCase();

            // Check cache first
            if (profanityCache.has(lowerWord)) {
                return profanityCache.get(lowerWord);
            }

            try {
                const response = await fetch(`https://www.purgomalum.com/service/containsprofanity?text=${encodeURIComponent(lowerWord)}`);
                const result = await response.text();
                const containsProfanity = result === 'true';

                // Cache the result
                profanityCache.set(lowerWord, containsProfanity);
                return containsProfanity;
            } catch (error) {
                // If API fails, be conservative and return false (allow the word)
                return false;
            }
        }

        // Browser-compatible word validation using Datamuse API
        async function checkWordExists(word) {
            const lowerWord = word.toLowerCase();

            // Check cache first
            if (wordCache.has(lowerWord)) {
                return wordCache.get(lowerWord);
            }

            try {
                const response = await fetch(`https://api.datamuse.com/words?sp=${encodeURIComponent(lowerWord)}&max=1`);
                const data = await response.json();
                const exists = data.length > 0 && data[0].word === lowerWord;

                // Cache the result
                wordCache.set(lowerWord, exists);
                return exists;
            } catch (error) {
                // If API fails, return false
                return false;
            }
        }

        function isVowel(char) {
            return vowels.includes(char.toLowerCase());
        }

        function getConsonantCluster(word) {
            const lowerWord = word.toLowerCase();

            // Check for three-letter clusters first
            for (let cluster of consonantClusters) {
                if (cluster.length === 3 && lowerWord.startsWith(cluster)) {
                    return cluster;
                }
            }

            // Then check for two-letter clusters
            for (let cluster of consonantClusters) {
                if (cluster.length === 2 && lowerWord.startsWith(cluster)) {
                    return cluster;
                }
            }

            // Single consonant
            if (!isVowel(lowerWord[0])) {
                return lowerWord[0];
            }

            return '';
        }

        function preserveCase(original, transformed) {
            if (!original || !transformed) return transformed;

            let result = '';
            let transformedLower = transformed.toLowerCase();

            // Check if original is all uppercase
            if (original === original.toUpperCase() && original !== original.toLowerCase()) {
                return transformed.toUpperCase();
            }

            // Check if original is capitalized
            if (original[0] === original[0].toUpperCase() && original.slice(1) === original.slice(1).toLowerCase()) {
                return transformed[0].toUpperCase() + transformed.slice(1).toLowerCase();
            }

            return transformed;
        }

        function englishToPigLatin(word) {
            if (!word) return '';

            const lowerWord = word.toLowerCase();

            // If starts with vowel, add -hay
            if (isVowel(lowerWord[0])) {
                return preserveCase(word, word + 'hay');
            }

            // Get consonant cluster
            const cluster = getConsonantCluster(word);
            if (cluster) {
                const rest = word.slice(cluster.length);
                const pigLatinWord = rest + cluster + 'ay';
                return preserveCase(word, pigLatinWord);
            }

            return word;
        }

        async function pigLatinToEnglish(word) {
            if (!word) return '';

            const lowerWord = word.toLowerCase();

            // Check if it ends with -hay (not just -ay)
            if (lowerWord.endsWith('hay') && lowerWord.length > 3) {
                const withoutHay = word.slice(0, -3);
                const withoutAy = word.slice(0, -2);

                // Try both possibilities
                const hayResult = await checkWordExists(withoutHay.toLowerCase());
                const consonantResult = await reverseConsonantMove(word, withoutAy);

                // If consonant reversal found a valid word (not same as original), prefer it
                if (consonantResult !== word) {
                    return consonantResult;
                }

                // Otherwise, if removing -hay gives valid word, use that
                if (hayResult) {
                    return preserveCase(word, withoutHay);
                }

                // If neither worked, return original
                return word;
            }

            // Check if it ends with -ay
            if (lowerWord.endsWith('ay') && lowerWord.length > 2) {
                const withoutAy = word.slice(0, -2);
                return await reverseConsonantMove(word, withoutAy);
            }

            return word;
        }

        async function reverseConsonantMove(originalWord, withoutAy) {
            const lowerWithoutAy = withoutAy.toLowerCase();

            // Try to find consonant cluster at the end that should move to beginning
            // Check three-letter clusters first
            for (let cluster of consonantClusters) {
                if (cluster.length === 3 && lowerWithoutAy.endsWith(cluster)) {
                    const rest = withoutAy.slice(0, -3);
                    const englishWord = cluster + rest;
                    // Run both checks in parallel
                    const [isValid, isProfane] = await Promise.all([
                        checkWordExists(englishWord.toLowerCase()),
                        isProfanity(englishWord)
                    ]);
                    if (isValid && !isProfane) {
                        return preserveCase(originalWord, englishWord);
                    }
                }
            }

            // Check two-letter clusters
            for (let cluster of consonantClusters) {
                if (cluster.length === 2 && lowerWithoutAy.endsWith(cluster)) {
                    const rest = withoutAy.slice(0, -2);
                    const englishWord = cluster + rest;
                    // Run both checks in parallel
                    const [isValid, isProfane] = await Promise.all([
                        checkWordExists(englishWord.toLowerCase()),
                        isProfanity(englishWord)
                    ]);
                    if (isValid && !isProfane) {
                        return preserveCase(originalWord, englishWord);
                    }
                }
            }

            // Try single consonant at the end
            if (lowerWithoutAy.length > 0) {
                const lastChar = lowerWithoutAy[lowerWithoutAy.length - 1];
                if (!isVowel(lastChar)) {
                    const rest = withoutAy.slice(0, -1);
                    const englishWord = lastChar + rest;
                    // Run both checks in parallel
                    const [isValid, isProfane] = await Promise.all([
                        checkWordExists(englishWord.toLowerCase()),
                        isProfanity(englishWord)
                    ]);
                    if (isValid && !isProfane) {
                        return preserveCase(originalWord, englishWord);
                    }
                }
            }

            return originalWord;
        }

        async function translateText(text, direction) {
            if (!text) return '';

            // Split by words but preserve punctuation and whitespace
            const tokens = text.split(/(\s+|[.,!?;:"'()[\]{}])/);

            const translatedTokens = [];
            for (const token of tokens) {
                // Skip whitespace and punctuation
                if (!token || /^\s+$/.test(token) || /^[.,!?;:"'()[\]{}]+$/.test(token)) {
                    translatedTokens.push(token);
                } else if (direction === 'toPigLatin') {
                    translatedTokens.push(englishToPigLatin(token));
                } else {
                    translatedTokens.push(await pigLatinToEnglish(token));
                }
            }

            return translatedTokens.join('');
        }

        let isUpdating = false;
        let debounceTimer = null;

        async function onEnglishInput() {
            if (isUpdating) return;

            const englishText = document.getElementById('english').value;
            const pigLatinText = await translateText(englishText, 'toPigLatin');

            isUpdating = true;
            document.getElementById('piglatin').value = pigLatinText;
            isUpdating = false;
        }

        async function onPigLatinInput() {
            if (isUpdating) return;

            // Clear existing timer
            if (debounceTimer) {
                clearTimeout(debounceTimer);
            }

            const pigLatinText = document.getElementById('piglatin').value;

            // Debounce: wait 300ms after user stops typing
            debounceTimer = setTimeout(async () => {
                const englishText = await translateText(pigLatinText, 'toEnglish');

                isUpdating = true;
                document.getElementById('english').value = englishText;
                isUpdating = false;
            }, 300);
        }

        function clearAll() {
            document.getElementById('english').value = '';
            document.getElementById('piglatin').value = '';
        }

        function copyOutput() {
            const pigLatinText = document.getElementById('piglatin').value;
            const copyBtn = document.getElementById('copyBtn');

            if (!pigLatinText) return;

            navigator.clipboard.writeText(pigLatinText).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');

                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>

</html>
